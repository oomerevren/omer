server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://cms:8055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /automation {
        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /metrics {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
    }
}

version: '3.8'

networks:
  public:
    driver: bridge
  internal:
    internal: true

volumes:
  n8n_data:
  pg_data:
  redis_data:
  cms_data:
  grafana_data:
  loki_data:
  prometheus_data:
  traefik_certs:

services:
  # --- Reverse Proxy (Traefik) ---
  traefik:
    image: traefik:v2.10.4
    container_name: medya-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- n8n Main (Queue Mode) ---
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.45.1
    container_name: medya-n8n-main
    restart: unless-stopped
    networks:
      - internal
      - public
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./storage:/storage
      - ./scripts:/scripts
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${DOMAIN_NAME}`) && PathPrefix(`/automation`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=myresolver"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- n8n Worker ---
  n8n-worker:
    image: docker.n8n.io/n8nio/n8n:1.45.1
    container_name: medya-n8n-worker
    command: worker
    restart: unless-stopped
    networks:
      - internal
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./storage:/storage
      - ./scripts:/scripts
    depends_on:
      - n8n

  # --- Database (pgvector) ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medya-postgres
    restart: unless-stopped
    networks:
      - internal
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis (Queue Store) ---
  redis:
    image: redis:7.2.4-alpine
    container_name: medya-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Monitoring Stack ---
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: medya-prometheus
    networks:
      - internal
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus_data:/prometheus

  loki:
    image: grafana/loki:2.9.4
    container_name: medya-loki
    networks:
      - internal
    volumes:
      - ./config/loki:/etc/loki
      - loki_data:/loki

  grafana:
    image: grafana/grafana:10.3.3
    container_name: medya-grafana
    networks:
      - public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`monitor.${DOMAIN_NAME}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
